# ============================================================
# PayPilot Analytics — GitHub Actions CI/CD Pipeline
# Runs on every push to main and all pull requests
# ============================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ──────────────────────────────────────────────────────────
  # 1. Backend: lint, type-check, test
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          APP_NAME=databricks-dbt-pipeline
          APP_ENV=test
          DEBUG=false
          LOG_LEVEL=WARNING
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SUPABASE_DB_HOST=${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT=${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME=${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER=${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}
          FASTAPI_HOST=0.0.0.0
          FASTAPI_PORT=8000
          EOF

      - name: Run backend API tests
        run: pytest tests/backend/ -v --tb=short

  # ──────────────────────────────────────────────────────────
  # 2. Frontend: install, lint, test, build
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run component tests
        working-directory: src/frontend
        run: npm test

      - name: Build production bundle
        working-directory: src/frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # 3. dbt: validate project structure
  # ──────────────────────────────────────────────────────────
  dbt-validate:
    name: dbt Project Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks_dbt_pipeline:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.SUPABASE_DB_HOST }}
                port: ${{ secrets.SUPABASE_DB_PORT }}
                user: ${{ secrets.SUPABASE_DB_USER }}
                password: ${{ secrets.SUPABASE_DB_PASSWORD }}
                dbname: ${{ secrets.SUPABASE_DB_NAME }}
                schema: gold
                threads: 1
          EOF

      - name: dbt parse (validate models compile)
        working-directory: analytics
        run: dbt parse --profiles-dir ~/.dbt

  # ──────────────────────────────────────────────────────────
  # 4. Docker builds (on main only)
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, dbt-validate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: paypilot-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: paypilot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
